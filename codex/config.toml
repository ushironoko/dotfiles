model = "gpt-5.6-sol"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
service_tier = "fast"


[notice]
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

[plugins."sites@openai-bundled"]
enabled = true

[plugins."visualize@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[tui]
notifications = true
notification_condition = "unfocused"
notification_method = "auto"
status_line = [
  "project-name",
  "current-dir",
  "git-branch",
  "branch-changes",
  "task-progress",
  "model-with-reasoning",
  "context-remaining",
]

[tui.model_availability_nux]
"gpt-5.5" = 4
"gpt-5.6-sol" = 4

[desktop]
usePointerCursors = true
followUpQueueMode = "queue"
dock-icon-preference = "codex-system"

[desktop.appearanceLightChromeTheme]
accent = "#339cff"
contrast = 50
ink = "#1a1c1f"
opaqueWindows = false
surface = "#ffffff"

[desktop.appearanceLightChromeTheme.fonts]

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#00a240"
diffRemoved = "#ba2623"
skill = "#924ff7"

[desktop.appearanceDarkChromeTheme]
accent = "#339cff"
contrast = 60
ink = "#ffffff"
opaqueWindows = false
surface = "#181818"

[desktop.appearanceDarkChromeTheme.fonts]

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#40c977"
diffRemoved = "#fa423e"
skill = "#ad7bf9"

[desktop.open-in-target-preferences]
global = "ghostty"

[features]
js_repl = false
hooks = true
multi_agent = true

[agents]
max_threads = 12
max_depth = 1
job_max_runtime_seconds = 1800
interrupt_message = true

