# tmux Configuration

# https://github.com/tmux/tmux/wiki

# Terminal / color
# Ghostty reports TERM=xterm-ghostty; declare RGB so hex colors render as TrueColor

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-256color:RGB"

# General

set -g mouse on
set -g history-limit 100000
set -g focus-events on
set -g set-clipboard on
set -g display-time 3000
set -g detach-on-destroy off
set -s escape-time 10

# Windows / panes
# 1-origin: 0 is far from 1 on the keyboard

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Open new windows/splits in the current pane's directory
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Copy mode

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Keep the selection highlighted (and stay in copy-mode) after mouse drag,
# so C-t can act on it; still copies to the clipboard
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear

# Translate to Japanese with claude in a popup (see translate-popup.sh)
# copy-mode C-t: pipe the selection into the named buffer "translate" so a
# stray click can't replace it before the popup reads it
# prefix T: translate the most recent buffer instead
bind -T copy-mode-vi C-t send -X copy-pipe-and-cancel "tmux load-buffer -b translate -" \; display-popup -w 80% -h 60% -T " translate | Enter to close " -E "~/.config/tmux/translate-popup.sh selection"
bind T display-popup -w 80% -h 60% -T " translate | Enter to close " -E "~/.config/tmux/translate-popup.sh buffer"

# Reload config

bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# Status bar
# bg #1c1918 matches Ghostty background, text #00aeb9, border #393f4c

set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1c1918,fg=#00aeb9"

# Left: session name (accent turns solid while prefix is active)
set -g status-left-length 30
set -g status-left "#{?client_prefix,#[fg=#1c1918]#[bg=#00aeb9]#[bold] #S ,#[fg=#00aeb9]#[bold] #S }#[default] "

# Center: window list
set -g status-justify left
setw -g window-status-format "#[fg=#00aeb9,dim] #I:#W "
setw -g window-status-current-format "#[fg=#00aeb9,bold] #I:#W#{?window_zoomed_flag, 󰊓,} "
setw -g window-status-separator ""

# Right: empty
set -g status-right ""

# Pane borders (matches Ghostty split-divider-color)
set -g pane-border-style "fg=#393f4c"
set -g pane-active-border-style "fg=#ff6600"

# Messages and copy-mode selection
set -g message-style "bg=#393f4c,fg=#ffffff"
set -g mode-style "bg=#ff6600,fg=#1c1918"
